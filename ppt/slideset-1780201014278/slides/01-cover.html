<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../assets/theme.css">
<style>
  .slide-container {
    background:
      radial-gradient(1100px 900px at 80% -5%, rgba(229,98,26,0.08), transparent 60%),
      radial-gradient(800px 600px at -5% 100%, rgba(91,61,245,0.05), transparent 60%),
      var(--cream);
  }
  /* Decorative corner lines */
  .corner-lines::before, .corner-lines::after {
    content: '';
    position: absolute;
    background: var(--ink);
    opacity: 0.12;
  }
  .corner-lines::before {
    top: 40px; left: 40px;
    width: 120px; height: 1px;
  }
  .corner-lines::after {
    top: 40px; left: 40px;
    width: 1px; height: 120px;
  }
</style>
</head>
<body>
<div class="slide-container corner-lines" data-screen-label="01 Cover" style="position:relative; width:1920px; height:1080px; overflow:hidden;">

  <!-- Top right date stamp -->
  <div data-object="true" data-object-type="textbox" style="position:absolute; left:1500px; top:60px; width:340px;">
    <p style="margin:0; font-family:var(--mono); font-size:16px; letter-spacing:0.22em; text-transform:uppercase; color:var(--muted); text-align:right;">31 MAY 2026</p>
  </div>

  <!-- Eyebrow -->
  <div data-object="true" data-object-type="textbox" style="position:absolute; left:160px; top:260px; width:800px;">
    <p class="eyebrow" style="margin:0;">FREE LIVE WORKSHOP</p>
  </div>

  <!-- Title -->
  <div data-object="true" data-object-type="textbox" style="position:absolute; left:160px; top:320px; width:1200px;">
    <h1 class="display" style="margin:0; font-size:128px;">Learn AI<br>From Scratch</h1>
  </div>

  <!-- Tagline -->
  <div data-object="true" data-object-type="textbox" style="position:absolute; left:160px; top:650px; width:700px;">
    <p class="kicker" style="margin:0; font-size:42px;">From User → Builder</p>
  </div>

  <!-- Divider -->
  <div data-object="true" data-object-type="shape" style="position:absolute; left:160px; top:740px; width:420px; height:4px; background:var(--ink); z-index:1;"></div>

  <!-- Author -->
  <div data-object="true" data-object-type="textbox" style="position:absolute; left:160px; top:780px; width:600px;">
    <p style="margin:0 0 8px; font-family:var(--sans); font-size:28px; font-weight:600; color:var(--ink);">Surya Pratap Singh</p>
    <p style="margin:0; font-family:var(--sans); font-size:20px; color:var(--muted);">Founder, Vasudev AI Academy</p>
  </div>

  <!-- Right decorative large number -->
  <div data-object="true" data-object-type="shape" style="position:absolute; left:1300px; top:200px; width:600px; height:700px; z-index:1; opacity:0.04; overflow:hidden;">
    <span style="font-family:var(--serif); font-size:700px; font-weight:900; color:var(--ink); line-height:0.75; display:block;">AI</span>
  </div>

  <!-- Bottom right accent block -->
  <div data-object="true" data-object-type="shape" style="position:absolute; left:1720px; top:900px; width:120px; height:120px; background:var(--saffron); z-index:1;"></div>

</div>
<script defer src="https://static.cloudflareinsights.com/beacon.min.js/v833ccba57c9e4d2798f2e76cebdd09a11778172276447" integrity="sha512-57MDmcccJXYtNnH+ZiBwzC4jb2rvgVCEokYN+L/nLlmO8rfYT/gIpW2A569iJ/3b+0UEasghjuZH/ma3wIs/EQ==" data-cf-beacon='{"version":"2024.11.0","token":"4edd5f8ec12a48cfa682ab8261b80a79","server_timing":{"name":{"cfCacheStatus":true,"cfEdge":true,"cfExtPri":true,"cfL4":true,"cfOrigin":true,"cfSpeedBrain":true},"location_startswith":null}}' crossorigin="anonymous"></script>
</body>
</html>
