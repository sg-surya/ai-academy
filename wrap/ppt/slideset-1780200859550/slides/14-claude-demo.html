<!doctype html>
<html lang="en">
<head>

</head>
<body>
<div class="slide-container" data-screen-label="14 Claude Demo" style="position:relative; width:1920px; height:1080px; overflow:hidden; background:var(--cream);">

  <!-- Brand rail -->
  <div data-object="true" data-object-type="textbox" style="position:absolute; left:80px; top:60px; width:400px;">
    <span class="brand-rail" style="position:static;"><span class="dot"></span>VASUDEV AI</span>
  </div>

  <div data-object="true" data-object-type="textbox" style="position:absolute; left:1740px; top:60px; width:100px;">
    <p style="margin:0; font-family:var(--mono); font-size:16px; color:var(--muted); text-align:right;">14/25</p>
  </div>

  <!-- Eyebrow -->
  <div data-object="true" data-object-type="textbox" style="position:absolute; left:160px; top:180px; width:600px;">
    <p class="eyebrow" style="margin:0;">CLAUDE DEMO</p>
  </div>

  <!-- Heading -->
  <div data-object="true" data-object-type="textbox" style="position:absolute; left:160px; top:240px; width:1200px;">
    <h2 class="display" style="margin:0; font-size:68px;">The Long-Form<br>Reading Partner.</h2>
  </div>

  <!-- 4-step pipeline -->
  <div data-object="true" data-object-type="textbox" style="position:absolute; left:160px; top:520px; width:1100px;">
    <div style="display:flex; flex-direction:column; gap:18px;">
      <div style="display:flex; align-items:center; gap:24px; padding:22px 30px; background:var(--cream-2); border-left:4px solid var(--saffron); border-radius:0 4px 4px 0;">
        <span style="font-family:var(--mono); font-size:14px; color:var(--saffron-2); letter-spacing:0.18em; min-width:50px;">01</span>
        <span style="font-family:var(--serif); font-size:32px; font-weight:600; color:var(--ink);">Upload Document</span>
      </div>
      <div style="display:flex; align-items:center; gap:24px; padding:22px 30px; background:var(--cream-2); border-left:4px solid var(--saffron); border-radius:0 4px 4px 0;">
        <span style="font-family:var(--mono); font-size:14px; color:var(--saffron-2); letter-spacing:0.18em; min-width:50px;">02</span>
        <span style="font-family:var(--serif); font-size:32px; font-weight:600; color:var(--ink);">Summarize</span>
      </div>
      <div style="display:flex; align-items:center; gap:24px; padding:22px 30px; background:var(--cream-2); border-left:4px solid var(--saffron); border-radius:0 4px 4px 0;">
        <span style="font-family:var(--mono); font-size:14px; color:var(--saffron-2); letter-spacing:0.18em; min-width:50px;">03</span>
        <span style="font-family:var(--serif); font-size:32px; font-weight:600; color:var(--ink);">Extract Insights</span>
      </div>
      <div style="display:flex; align-items:center; gap:24px; padding:22px 30px; background:var(--ink); border-left:4px solid var(--saffron); border-radius:0 4px 4px 0;">
        <span style="font-family:var(--mono); font-size:14px; color:var(--saffron); letter-spacing:0.18em; min-width:50px;">04</span>
        <span style="font-family:var(--serif); font-size:32px; font-weight:600; color:var(--cream);">Ask Questions</span>
      </div>
    </div>
  </div>

  <!-- Right "Best for" card -->
  <div data-object="true" data-object-type="shape" style="position:absolute; left:1340px; top:520px; width:440px; height:380px; border:2px solid var(--ink); border-radius:4px; z-index:1;"></div>
  <div data-object="true" data-object-type="textbox" style="position:absolute; left:1380px; top:560px; width:360px; z-index:10;">
    <p style="margin:0 0 24px; font-family:var(--mono); font-size:14px; color:var(--saffron-2); letter-spacing:0.2em; text-transform:uppercase;">Best For</p>
    <p style="margin:0 0 16px; font-family:var(--serif); font-size:38px; font-weight:600; color:var(--ink);">PDFs</p>
    <p style="margin:0 0 16px; font-family:var(--serif); font-size:38px; font-weight:600; color:var(--ink);">Reports</p>
    <p style="margin:0; font-family:var(--serif); font-size:38px; font-weight:600; color:var(--ink);">Long Documents</p>
  </div>

  <!-- Footer -->
  <div data-object="true" data-object-type="textbox" style="position:absolute; left:80px; top:1010px; width:400px;">
    <p style="margin:0; font-family:var(--mono); font-size:13px; letter-spacing:0.22em; color:var(--muted); text-transform:uppercase;">LEARN AI FROM SCRATCH</p>
  </div>

</div>
